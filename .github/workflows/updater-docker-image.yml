name: Updater Docker Image

on:
  push:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check Out Repo
      uses: actions/checkout@v6

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v4
      with:
        registry: ediwang.azurecr.io
        username: ediwang
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v7
      with:
        context: ./azure-file-share-updater
        file: ./azure-file-share-updater/Dockerfile
        push: true
        tags: ediwang.azurecr.io/ipinfo-updater:latest

    - name: Image digest
      run: echo ${{ steps.docker_build.outputs.digest }}
